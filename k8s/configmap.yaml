apiVersion: v1
kind: ConfigMap
metadata:
  name: llmops-config
  namespace: llmops
data:
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  SERVICE_NAME: "llmops-platform"
  DEFAULT_MODEL: "llama-3.3-70b-versatile"
  MODEL_TIMEOUT_SECONDS: "30"
  REDIS_HOST: "llmops-redis"
  REDIS_PORT: "6379"
  MLFLOW_TRACKING_URI: "http://llmops-mlflow:5000"
  MLFLOW_EXPERIMENT_NAME: "llmops-platform"
  COST_PER_1K_PROMPT_TOKENS: "0.00015"
  COST_PER_1K_COMPLETION_TOKENS: "0.0006"
---
apiVersion: v1
kind: Secret
metadata:
  name: llmops-secrets
  namespace: llmops
type: Opaque
stringData:
  OPENAI_API_KEY: "replace-me"
  OPENAI_BASE_URL: "https://api.groq.com/openai/v1"
  DATABASE_URL: "postgresql+asyncpg://llmops:llmops_pass@llmops-postgres:5432/llmops"
