apiVersion: v1
kind: Service
metadata:
  name: llmops-app
  namespace: llmops
spec:
  selector:
    app: llmops-app
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: llmops-postgres
  namespace: llmops
spec:
  selector:
    app: llmops-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: llmops-redis
  namespace: llmops
spec:
  selector:
    app: llmops-redis
  ports:
    - port: 6379
      targetPort: 6379
