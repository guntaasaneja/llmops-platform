# A standard Kubernetes Deployment for the LLMOps app, plus Postgres and
# Redis as supporting services. Readiness/liveness probes hit the same
# /ready and /health endpoints used by Docker's HEALTHCHECK.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmops-app
  namespace: llmops
  labels:
    app: llmops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llmops-app
  template:
    metadata:
      labels:
        app: llmops-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: llmops-app
          image: ghcr.io/your-org/llmops-platform:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: llmops-config
            - secretRef:
                name: llmops-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmops-postgres
  namespace: llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llmops-postgres
  template:
    metadata:
      labels:
        app: llmops-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: llmops
            - name: POSTGRES_PASSWORD
              value: llmops_pass
            - name: POSTGRES_DB
              value: llmops
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pg-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmops-redis
  namespace: llmops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llmops-redis
  template:
    metadata:
      labels:
        app: llmops-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
