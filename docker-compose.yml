services:
  app:
    build: .
    container_name: llmops-app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mlflow
    networks:
      - llmops-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: llmops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llmops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmops_pass}
      POSTGRES_DB: ${POSTGRES_DB:-llmops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - llmops-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: llmops-redis
    ports:
      - "6379:6379"
    networks:
      - llmops-net
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: llmops-mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlruns
      --host 0.0.0.0
      --port 5000
    ports:
      - "5002:5000"
    volumes:
      - mlflow_data:/mlruns
    networks:
      - llmops-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: llmops-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - llmops-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: llmops-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - llmops-net
    restart: unless-stopped

networks:
  llmops-net:
    driver: bridge

volumes:
  postgres_data:
  mlflow_data:
  grafana_data:
